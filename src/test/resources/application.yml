spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

gateway:
  tools:
    execution-timeout-millis: 2000
    retry-attempts: 1
    output-preview-max-chars: 300
  moderation:
    input:
      enabled: true
      rules:
        - category: self-harm
          pattern: "자해 방법"
          verdict: BLOCK
          reason: "자해 유도성 요청은 허용되지 않습니다."
          score: 0.99
    output:
      enabled: true
      rules:
        - category: credentials
          pattern: "secret token"
          verdict: BLOCK
          reason: "민감 자격 증명 노출 가능성이 있습니다."
          score: 0.98
  redis:
    enabled: false
    namespace: ai-gateway-test
  security:
    enabled: true
    api-key-header: X-API-Key
    clients:
      - client-id: local-operator
        tenant-id: tenant-default
        api-key-hash: 2bcd99491790f5324dd084241b713b576a92b12c497f3b553230d49cc72e15c2
        role: OPERATOR
        requests-per-minute: 60
        daily-request-quota: 1000
        daily-token-quota: 50000
        allowed-providers:
          - mock
          - openai
        manageable-tenants: []
        allowed-tools:
          - lookup_weather
          - lookup_time
      - client-id: local-admin
        tenant-id: tenant-default
        api-key-hash: 343511f8de8d241b42f5bfd2f4969eec3bbdc57fbb3eb252a8e4b840572ec89c
        role: ADMIN
        requests-per-minute: 120
        daily-request-quota: 5000
        daily-token-quota: 200000
        allowed-providers:
          - mock
          - openai
        manageable-tenants:
          - tenant-default
          - tenant-enterprise
          - tenant-rollback
        allowed-tools:
          - lookup_weather
          - lookup_time
  guardrail:
    input:
      max-prompt-length: 500
      forbidden-keywords:
        - malware
        - ransomware
        - exploit
      operator-restricted-keywords:
        - admin-secret
        - system prompt override
        - root credential
      pii-patterns:
        - description: 주민등록번호
          regex: "\\b\\d{6}-\\d{7}\\b"
          action: BLOCK
        - description: 이메일
          regex: "\\b[\\w._%+-]+@[\\w.-]+\\.[A-Za-z]{2,}\\b"
          action: BLOCK
        - description: 전화번호
          regex: "\\b01[0-9]-?\\d{3,4}-?\\d{4}\\b"
          action: BLOCK
    ai:
      enabled: true
      policies:
        - pattern: "ignore previous instructions"
          verdict: BLOCK
          reason: "프롬프트 인젝션 의심 문구가 감지되었습니다."
          score: 0.97
    output:
      enabled: true
      mask-pii: true
      blocked-keywords:
        - admin-secret
        - root credential
        - system prompt
      pii-patterns:
        - description: 이메일
          regex: "\\b[\\w._%+-]+@[\\w.-]+\\.[A-Za-z]{2,}\\b"
          action: MASK
      ai-policies:
        - pattern: "기밀"
          verdict: REVIEW
          reason: "출력에 기밀 정보 가능성이 있어 검토가 필요합니다."
          score: 0.85
  tenants:
    policies:
      tenant-default:
        input:
          forbidden-keywords:
            - malware
            - ransomware
  providers:
    resilience:
      retry-attempts: 2
      retry-backoff: 300ms
      circuit-breaker-sliding-window-size: 10
      circuit-breaker-minimum-calls: 5
      circuit-breaker-failure-rate-threshold: 50
      circuit-breaker-open-duration: 30s
    openai:
      enabled: false
      api-key: test-key
      base-url: https://api.openai.com/v1
      model: gpt-4.1-mini
      pricing:
        input-cost-per-1k-tokens: 0.0008
        output-cost-per-1k-tokens: 0.0032
      developer-message: test
      max-completion-tokens: 400
      connect-timeout-millis: 3000
      read-timeout-millis: 15000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
